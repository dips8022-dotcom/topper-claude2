<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>텍스트 토퍼 생성기</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>✨ 텍스트 토퍼 생성기 ✨</h1>
            <p>원하는 텍스트를 꾸며보세요!</p>
        </header>

        <section class="input-section">
            <label for="textInput">텍스트 입력</label>
            <input type="text" id="textInput" placeholder="꾸밀 텍스트를 입력하세요..." maxlength="30">
        </section>

        <section class="category-section">
            <div class="category-tabs">
                <button class="tab-btn active" data-category="all">전체</button>
                <button class="tab-btn" data-category="basic">기본</button>
                <button class="tab-btn" data-category="fancy">화려함</button>
                <button class="tab-btn" data-category="cute">귀여움</button>
                <button class="tab-btn" data-category="elegant">우아함</button>
            </div>
        </section>

        <section class="results-section">
            <div id="resultsGrid" class="results-grid"></div>
        </section>

        <div id="toast" class="toast">클립보드에 복사되었습니다! 📋</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
