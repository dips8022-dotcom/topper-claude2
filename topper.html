<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>토퍼 글자 만들기</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&family=Noto+Serif+KR:wght@400;700;900&family=Black+Han+Sans&family=Gaegu:wght@400;700&family=Jua&family=Nanum+Brush+Script&family=Nanum+Pen+Script&family=Do+Hyeon&family=Cute+Font&family=East+Sea+Dokdo&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: #f5f0eb;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px 16px 60px;
      color: #2d2d2d;
    }

    h1 {
      font-size: 2rem;
      font-weight: 900;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
      color: #1a1a1a;
    }

    .subtitle {
      font-size: 0.9rem;
      color: #888;
      margin-bottom: 32px;
    }

    .container {
      display: flex;
      gap: 28px;
      width: 100%;
      max-width: 1100px;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    /* ─── 패널 ─── */
    .panel {
      background: #fff;
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      flex: 1 1 320px;
      min-width: 280px;
    }

    .panel h2 {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 20px;
      color: #444;
      border-bottom: 2px solid #f0e8df;
      padding-bottom: 10px;
    }

    .field { margin-bottom: 20px; }

    .field label {
      display: block;
      font-size: 0.82rem;
      font-weight: 700;
      color: #666;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    textarea {
      width: 100%;
      min-height: 90px;
      border: 2px solid #e8e0d8;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 1rem;
      font-family: inherit;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
      color: #2d2d2d;
    }
    textarea:focus { border-color: #f4a261; }

    select {
      width: 100%;
      border: 2px solid #e8e0d8;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      background: #fff;
      cursor: pointer;
      transition: border-color 0.2s;
      color: #2d2d2d;
    }
    select:focus { border-color: #f4a261; }

    .range-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    input[type="range"] {
      flex: 1;
      -webkit-appearance: none;
      height: 6px;
      border-radius: 6px;
      background: #e8e0d8;
      outline: none;
      cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #f4a261;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(244,162,97,0.5);
      transition: transform 0.15s;
    }
    input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.2); }

    .range-val {
      min-width: 50px;
      text-align: right;
      font-size: 0.9rem;
      font-weight: 700;
      color: #f4a261;
    }

    .color-row {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .color-presets { display: flex; gap: 8px; flex-wrap: wrap; }

    .color-swatch {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      cursor: pointer;
      border: 3px solid transparent;
      transition: transform 0.15s, border-color 0.15s;
    }
    .color-swatch:hover { transform: scale(1.2); }
    .color-swatch.active { border-color: #2d2d2d !important; }

    .color-picker-btn {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 2px dashed #ccc;
      cursor: pointer;
      overflow: hidden;
      position: relative;
      flex-shrink: 0;
    }
    .color-picker-btn input[type="color"] {
      position: absolute;
      width: 200%;
      height: 200%;
      top: -50%;
      left: -50%;
      cursor: pointer;
      border: none;
      padding: 0;
    }

    .toggle-wrap { display: flex; align-items: center; gap: 10px; }
    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute;
      inset: 0;
      background: #ddd;
      border-radius: 24px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 18px; height: 18px;
      left: 3px; top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .toggle input:checked + .toggle-slider { background: #f4a261; }
    .toggle input:checked + .toggle-slider::before { transform: translateX(20px); }
    .toggle-label { font-size: 0.88rem; color: #555; }

    .align-btns { display: flex; gap: 8px; }
    .align-btn {
      flex: 1;
      padding: 8px;
      border: 2px solid #e8e0d8;
      border-radius: 10px;
      background: #fff;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.15s;
      color: #555;
    }
    .align-btn:hover { border-color: #f4a261; }
    .align-btn.active { border-color: #f4a261; background: #fff5ee; color: #e07b3a; font-weight: 700; }

    /* ─── 프리뷰 ─── */
    .preview-panel {
      flex: 1.3 1 400px;
      min-width: 300px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .canvas-wrap {
      background: #fff;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .canvas-wrap h2 {
      align-self: flex-start;
      font-size: 1rem;
      font-weight: 700;
      color: #444;
      border-bottom: 2px solid #f0e8df;
      padding-bottom: 10px;
      width: 100%;
      margin-bottom: 0;
    }

    .checker-bg {
      background-image:
        linear-gradient(45deg, #ccc 25%, transparent 25%),
        linear-gradient(-45deg, #ccc 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #ccc 75%),
        linear-gradient(-45deg, transparent 75%, #ccc 75%);
      background-size: 16px 16px;
      background-position: 0 0, 0 8px, 8px -8px, -8px 0px;
      background-color: #e8e8e8;
      border-radius: 12px;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      width: 100%;
      min-height: 120px;
    }

    canvas {
      display: block;
      max-width: 100%;
      height: auto;
    }

    .canvas-info { font-size: 0.78rem; color: #aaa; }

    .btn-group { display: flex; gap: 10px; width: 100%; }

    .btn {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 14px;
      font-size: 0.95rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary { background: #f4a261; color: #fff; }
    .btn-primary:hover { background: #e07b3a; transform: translateY(-1px); }
    .btn-secondary { background: #2d2d2d; color: #fff; }
    .btn-secondary:hover { background: #111; transform: translateY(-1px); }

    .size-presets { display: flex; gap: 8px; flex-wrap: wrap; }
    .size-preset {
      padding: 6px 12px;
      border: 2px solid #e8e0d8;
      border-radius: 20px;
      background: #fff;
      font-size: 0.78rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
      color: #555;
    }
    .size-preset:hover { border-color: #f4a261; color: #f4a261; }
    .size-preset.active { border-color: #f4a261; background: #fff5ee; color: #f4a261; }

    @media (max-width: 700px) {
      h1 { font-size: 1.4rem; }
      .container { flex-direction: column; }
    }
  </style>
</head>
<body>

<h1>🎉 토퍼 글자 만들기</h1>
<p class="subtitle">글씨체 · 색상 · 자간 · 행간 조절 → 투명 배경 PNG 다운로드</p>

<div class="container">

  <!-- ── 텍스트 설정 패널 ── -->
  <div class="panel">
    <h2>✏️ 텍스트 설정</h2>

    <div class="field">
      <label>글자 입력</label>
      <textarea id="text" placeholder="토퍼에 넣을 글자를 입력하세요&#10;여러 줄도 가능해요">Happy Birthday!</textarea>
    </div>

    <div class="field">
      <label>글씨체</label>
      <select id="font">
        <option value="'Black Han Sans', sans-serif">블랙한산스 (굵은 고딕)</option>
        <option value="'Jua', sans-serif">주아체</option>
        <option value="'Do Hyeon', sans-serif">도현체</option>
        <option value="'Cute Font', cursive">귀여운글씨체</option>
        <option value="'East Sea Dokdo', cursive">독도체</option>
        <option value="'Gaegu', cursive">가에구 (손글씨)</option>
        <option value="'Nanum Brush Script', cursive">나눔붓글씨</option>
        <option value="'Nanum Pen Script', cursive">나눔펜글씨</option>
        <option value="'Noto Sans KR', sans-serif">노토산스 (깔끔)</option>
        <option value="'Noto Serif KR', serif">노토세리프 (명조)</option>
        <option value="'Georgia', serif">Georgia</option>
        <option value="'Arial Black', sans-serif">Arial Black</option>
      </select>
    </div>

    <div class="field">
      <label>글자 크기</label>
      <div class="range-wrap">
        <input type="range" id="fontSize" min="12" max="200" value="80" />
        <span class="range-val" id="fontSizeVal">80px</span>
      </div>
    </div>

    <div class="field">
      <label>글자 두께</label>
      <select id="fontWeight">
        <option value="400">보통</option>
        <option value="700">굵게</option>
        <option value="900" selected>매우 굵게</option>
      </select>
    </div>

    <div class="field">
      <label>정렬</label>
      <div class="align-btns">
        <button class="align-btn" data-align="left">왼쪽</button>
        <button class="align-btn active" data-align="center">가운데</button>
        <button class="align-btn" data-align="right">오른쪽</button>
      </div>
    </div>

    <div class="field">
      <label>자간 (letter spacing)</label>
      <div class="range-wrap">
        <input type="range" id="letterSpacing" min="-10" max="60" value="0" />
        <span class="range-val" id="letterSpacingVal">0px</span>
      </div>
    </div>

    <div class="field">
      <label>행간 (line height)</label>
      <div class="range-wrap">
        <input type="range" id="lineHeight" min="0.8" max="3" step="0.05" value="1.3" />
        <span class="range-val" id="lineHeightVal">1.3×</span>
      </div>
    </div>
  </div>

  <!-- ── 스타일 패널 ── -->
  <div class="panel">
    <h2>🎨 색상 & 스타일</h2>

    <div class="field">
      <label>글자 색상</label>
      <div class="color-row">
        <div class="color-presets" id="textColorPresets">
          <div class="color-swatch active" data-color="#1a1a1a" style="background:#1a1a1a"></div>
          <div class="color-swatch" data-color="#ffffff" style="background:#ffffff;border-color:#ddd !important;outline:1px solid #ddd"></div>
          <div class="color-swatch" data-color="#e63946" style="background:#e63946"></div>
          <div class="color-swatch" data-color="#f4a261" style="background:#f4a261"></div>
          <div class="color-swatch" data-color="#2a9d8f" style="background:#2a9d8f"></div>
          <div class="color-swatch" data-color="#457b9d" style="background:#457b9d"></div>
          <div class="color-swatch" data-color="#6a4c93" style="background:#6a4c93"></div>
          <div class="color-swatch" data-color="#f7c948" style="background:#f7c948"></div>
          <div class="color-swatch" data-color="#ff6b9d" style="background:#ff6b9d"></div>
          <div class="color-swatch" data-color="#06d6a0" style="background:#06d6a0"></div>
          <div class="color-swatch" data-color="#D4AF37" style="background:#D4AF37" title="금색"></div>
          <div class="color-swatch" data-color="#C0C0C0" style="background:#C0C0C0" title="은색"></div>
          <div class="color-swatch" data-gradient='["#BF953F","#FCF6BA","#B38728","#FBF5B7","#AA771C"]' style="background:linear-gradient(135deg,#BF953F,#FCF6BA,#B38728,#FBF5B7,#AA771C)" title="금색 그라데이션"></div>
          <div class="color-swatch" data-gradient='["#8e9eab","#eef2f3","#8e9eab","#c9d6df"]' style="background:linear-gradient(135deg,#8e9eab,#eef2f3,#8e9eab)" title="은색 그라데이션"></div>
          <div class="color-swatch" data-gradient='["#ff0000","#ff7700","#ffee00","#00cc00","#0055ff","#8b00ff"]' style="background:linear-gradient(135deg,#ff0000,#ff7700,#ffee00,#00cc00,#0055ff,#8b00ff)" title="무지개 그라데이션"></div>
          <div class="color-swatch" data-gradient='["#f953c6","#b91d73"]' style="background:linear-gradient(135deg,#f953c6,#b91d73)" title="핑크 그라데이션"></div>
          <div class="color-swatch" data-gradient='["#f7971e","#ffd200"]' style="background:linear-gradient(135deg,#f7971e,#ffd200)" title="노을 그라데이션"></div>
        </div>
        <div class="color-picker-btn" title="직접 색상 선택">
          <input type="color" id="textColorPicker" value="#1a1a1a" />
        </div>
      </div>
    </div>

    <div class="field">
      <label>테두리 (Stroke)</label>
      <div class="toggle-wrap" style="margin-bottom:12px">
        <label class="toggle">
          <input type="checkbox" id="strokeEnabled" />
          <span class="toggle-slider"></span>
        </label>
        <span class="toggle-label">테두리 사용</span>
      </div>
      <div class="color-row" style="margin-bottom:10px">
        <div class="color-presets" id="strokeColorPresets">
          <div class="color-swatch active" data-color="#ffffff" style="background:#ffffff;outline:1px solid #ddd"></div>
          <div class="color-swatch" data-color="#1a1a1a" style="background:#1a1a1a"></div>
          <div class="color-swatch" data-color="#e63946" style="background:#e63946"></div>
          <div class="color-swatch" data-color="#f7c948" style="background:#f7c948"></div>
          <div class="color-swatch" data-color="#ff6b9d" style="background:#ff6b9d"></div>
          <div class="color-swatch" data-color="#D4AF37" style="background:#D4AF37" title="금색"></div>
          <div class="color-swatch" data-color="#C0C0C0" style="background:#C0C0C0" title="은색"></div>
          <div class="color-swatch" data-gradient='["#BF953F","#FCF6BA","#B38728","#FBF5B7","#AA771C"]' style="background:linear-gradient(135deg,#BF953F,#FCF6BA,#B38728,#FBF5B7,#AA771C)" title="금색 그라데이션"></div>
          <div class="color-swatch" data-gradient='["#8e9eab","#eef2f3","#8e9eab","#c9d6df"]' style="background:linear-gradient(135deg,#8e9eab,#eef2f3,#8e9eab)" title="은색 그라데이션"></div>
        </div>
        <div class="color-picker-btn" title="직접 색상 선택">
          <input type="color" id="strokeColorPicker" value="#ffffff" />
        </div>
      </div>
      <div class="range-wrap">
        <input type="range" id="strokeWidth" min="1" max="20" value="4" />
        <span class="range-val" id="strokeWidthVal">4px</span>
      </div>
    </div>

    <div class="field">
      <label>그림자 (Shadow)</label>
      <div class="toggle-wrap" style="margin-bottom:12px">
        <label class="toggle">
          <input type="checkbox" id="shadowEnabled" />
          <span class="toggle-slider"></span>
        </label>
        <span class="toggle-label">그림자 사용</span>
      </div>
      <div class="range-wrap">
        <input type="range" id="shadowBlur" min="0" max="40" value="10" />
        <span class="range-val" id="shadowBlurVal">10px</span>
      </div>
    </div>

    <div class="field">
      <label>캔버스 크기 프리셋</label>
      <div class="size-presets">
        <button class="size-preset" data-w="400" data-h="200">가로형</button>
        <button class="size-preset active" data-w="600" data-h="300">중간</button>
        <button class="size-preset" data-w="300" data-h="400">세로형</button>
        <button class="size-preset" data-w="500" data-h="500">정사각</button>
        <button class="size-preset" data-w="800" data-h="400">와이드</button>
      </div>
    </div>

    <div class="field">
      <label>여백 (Padding)</label>
      <div class="range-wrap">
        <input type="range" id="padding" min="0" max="100" value="30" />
        <span class="range-val" id="paddingVal">30px</span>
      </div>
    </div>
  </div>

  <!-- ── 프리뷰 패널 ── -->
  <div class="preview-panel">
    <div class="canvas-wrap">
      <h2>👀 미리보기</h2>
      <div class="checker-bg">
        <canvas id="canvas"></canvas>
      </div>
      <p class="canvas-info" id="canvasInfo">600 × 300 px · 투명 배경</p>
      <div class="btn-group">
        <button class="btn btn-primary" id="refreshBtn">🔄 새로고침</button>
        <button class="btn btn-secondary" id="downloadBtn">⬇️ PNG 다운로드</button>
      </div>
    </div>
  </div>

</div>

<script>
  const state = {
    text: 'Happy Birthday!',
    font: "'Black Han Sans', sans-serif",
    fontSize: 80,
    fontWeight: '900',
    align: 'center',
    letterSpacing: 0,
    lineHeight: 1.3,
    textColor: '#1a1a1a',
    textGradient: null,
    strokeEnabled: false,
    strokeColor: '#ffffff',
    strokeGradient: null,
    strokeWidth: 4,
    shadowEnabled: false,
    shadowBlur: 10,
    canvasW: 600,
    canvasH: 300,
    padding: 30,
  };

  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  function render() {
    canvas.width = state.canvasW;
    canvas.height = state.canvasH;
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const lines = state.text.split('\n');
    ctx.font = `${state.fontWeight} ${state.fontSize}px ${state.font}`;
    ctx.textBaseline = 'middle';

    const lineHeightPx = state.fontSize * state.lineHeight;
    const totalH = lineHeightPx * lines.length;
    const startY = (canvas.height - totalH) / 2 + lineHeightPx / 2;

    // shadow
    if (state.shadowEnabled) {
      ctx.shadowColor = 'rgba(0,0,0,0.45)';
      ctx.shadowBlur = state.shadowBlur;
      ctx.shadowOffsetX = 2;
      ctx.shadowOffsetY = 2;
    } else {
      ctx.shadowColor = 'transparent';
      ctx.shadowBlur = 0;
      ctx.shadowOffsetX = 0;
      ctx.shadowOffsetY = 0;
    }

    lines.forEach((line, i) => {
      const y = startY + i * lineHeightPx;
      const x = getAlignX();
      drawLine(line, x, y);
    });
  }

  function getAlignX() {
    if (state.align === 'left') return state.padding;
    if (state.align === 'right') return canvas.width - state.padding;
    return canvas.width / 2;
  }

  function makeGradient(stops) {
    const grad = ctx.createLinearGradient(0, 0, canvas.width, 0);
    stops.forEach((c, i) => grad.addColorStop(i / (stops.length - 1), c));
    return grad;
  }

  function applyFill() {
    ctx.fillStyle = state.textGradient ? makeGradient(state.textGradient) : state.textColor;
  }

  function applyStroke() {
    ctx.strokeStyle = state.strokeGradient ? makeGradient(state.strokeGradient) : state.strokeColor;
    ctx.lineWidth = state.strokeWidth * 2;
    ctx.lineJoin = 'round';
  }

  function drawLine(line, startX, y) {
    const chars = [...line];

    if (state.letterSpacing === 0) {
      ctx.textAlign = state.align;
      if (state.strokeEnabled) {
        applyStroke();
        ctx.strokeText(line, startX, y);
      }
      applyFill();
      ctx.fillText(line, startX, y);
    } else {
      ctx.textAlign = 'left';
      const totalW = chars.reduce((w, ch, i) =>
        w + ctx.measureText(ch).width + (i < chars.length - 1 ? state.letterSpacing : 0), 0);

      let x;
      if (state.align === 'center') x = startX - totalW / 2;
      else if (state.align === 'right') x = startX - totalW;
      else x = startX;

      chars.forEach((ch) => {
        const w = ctx.measureText(ch).width;
        if (state.strokeEnabled) {
          applyStroke();
          ctx.strokeText(ch, x, y);
        }
        applyFill();
        ctx.fillText(ch, x, y);
        x += w + state.letterSpacing;
      });
    }
  }

  function scheduleRender() {
    document.fonts.ready.then(() => render());
  }

  function bindRange(id, key, suffix, toFixed) {
    const el = document.getElementById(id);
    const valEl = document.getElementById(id + 'Val');
    el.addEventListener('input', () => {
      const v = parseFloat(el.value);
      state[key] = v;
      valEl.textContent = toFixed ? v.toFixed(toFixed).replace(/\.?0+$/, '') + suffix : v + suffix;
      render();
    });
  }

  function bindColorPresets(containerId, key, picker) {
    const gradKey = key === 'textColor' ? 'textGradient' : 'strokeGradient';
    document.getElementById(containerId).querySelectorAll('.color-swatch').forEach(sw => {
      sw.addEventListener('click', () => {
        document.getElementById(containerId).querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
        sw.classList.add('active');
        if (sw.dataset.gradient) {
          state[gradKey] = JSON.parse(sw.dataset.gradient);
        } else {
          state[gradKey] = null;
          state[key] = sw.dataset.color;
          picker.value = /^#[0-9a-f]{6}$/i.test(sw.dataset.color) ? sw.dataset.color : '#000000';
        }
        render();
      });
    });
    picker.addEventListener('input', () => {
      document.getElementById(containerId).querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
      state[gradKey] = null;
      state[key] = picker.value;
      render();
    });
  }

  window.addEventListener('DOMContentLoaded', () => {
    document.getElementById('text').addEventListener('input', e => {
      state.text = e.target.value;
      render();
    });

    document.getElementById('font').addEventListener('change', e => {
      state.font = e.target.value;
      scheduleRender();
    });

    document.getElementById('fontWeight').addEventListener('change', e => {
      state.fontWeight = e.target.value;
      render();
    });

    bindRange('fontSize', 'fontSize', 'px');
    bindRange('letterSpacing', 'letterSpacing', 'px');
    bindRange('lineHeight', 'lineHeight', '×', 2);
    bindRange('strokeWidth', 'strokeWidth', 'px');
    bindRange('shadowBlur', 'shadowBlur', 'px');
    bindRange('padding', 'padding', 'px');

    document.querySelectorAll('.align-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.align-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        state.align = btn.dataset.align;
        render();
      });
    });

    const textPicker = document.getElementById('textColorPicker');
    const strokePicker = document.getElementById('strokeColorPicker');
    bindColorPresets('textColorPresets', 'textColor', textPicker);
    bindColorPresets('strokeColorPresets', 'strokeColor', strokePicker);

    document.getElementById('strokeEnabled').addEventListener('change', e => {
      state.strokeEnabled = e.target.checked;
      render();
    });

    document.getElementById('shadowEnabled').addEventListener('change', e => {
      state.shadowEnabled = e.target.checked;
      render();
    });

    document.querySelectorAll('.size-preset').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.size-preset').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        state.canvasW = parseInt(btn.dataset.w);
        state.canvasH = parseInt(btn.dataset.h);
        document.getElementById('canvasInfo').textContent =
          `${state.canvasW} × ${state.canvasH} px · 투명 배경`;
        render();
      });
    });

    document.getElementById('refreshBtn').addEventListener('click', scheduleRender);

    document.getElementById('downloadBtn').addEventListener('click', () => {
      render();
      const link = document.createElement('a');
      link.download = 'topper.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    });

    scheduleRender();
  });
</script>
</body>
</html>
